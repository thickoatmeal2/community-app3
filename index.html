<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pulse — Share Your World</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a34;
      --accent: #e8ff47;
      --accent2: #ff6b6b;
      --accent3: #6bffce;
      --text: #f0f0f4;
      --muted: #7a7a90;
      --radius: 16px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Noise Overlay - FIXED z-index */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: -1;
      opacity: 0.4;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(13,13,15,0.95);
      backdrop-filter: blur(16px);
      z-index: 100;
    }

    .logo {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.5rem;
      letter-spacing: -0.03em;
      color: var(--accent);
    }
    .logo span { color: var(--text); }

    .nav-right { 
      display: flex; 
      align-items: center; 
      gap: 12px; 
    }

    .btn {
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.875rem;
      padding: 9px 22px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { 
      color: var(--text); 
      border-color: var(--muted); 
    }

    .btn-primary {
      background: var(--accent);
      color: #0d0d0f;
      font-weight: 700;
    }
    .btn-primary:hover { 
      background: #d4e93e; 
      transform: translateY(-1px); 
    }

    .btn-danger {
      background: transparent;
      color: var(--accent2);
      border: 1px solid var(--accent2);
    }
    .btn-danger:hover { 
      background: var(--accent2); 
      color: #fff; 
    }

    .user-chip {
      display: flex; 
      align-items: center; 
      gap: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px 6px 6px;
      font-size: 0.85rem;
    }

    .avatar {
      width: 28px; 
      height: 28px; 
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-weight: 700; 
      font-size: 0.75rem; 
      color: #0d0d0f;
    }

    /* MODALS */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal h2 {
      font-family: var(--font-head);
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .modal p { 
      color: var(--muted); 
      margin-bottom: 28px; 
    }

    .field { margin-bottom: 18px; }
    .field label { 
      display: block; 
      font-size: 0.8rem; 
      color: var(--muted); 
      margin-bottom: 6px; 
      text-transform: uppercase; 
      letter-spacing: 0.06em;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
    }
    .field input:focus { 
      border-color: var(--accent); 
    }

    .modal-actions { 
      display: flex; 
      gap: 10px; 
      justify-content: flex-end; 
      margin-top: 12px; 
    }

    /* LAYOUT */
    .page {
      display: flex;
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
      gap: 32px;
    }

    .sidebar { width: 220px; flex-shrink: 0; }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 12px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      margin-bottom: 4px;
      transition: all 0.15s;
    }
    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: var(--surface2);
      color: var(--text);
    }

    .feed { flex: 1; min-width: 0; }

    /* Composer */
    .composer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 24px;
    }

    .composer-top {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .composer-avatar {
      width: 40px; 
      height: 40px; 
      border-radius: 50%; 
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent3));
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-weight: 700; 
      font-size: 0.85rem; 
      color: #0d0d0f;
    }

    .composer textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-size: 1rem;
      line-height: 1.6;
      min-height: 72px;
    }

    .composer-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }

    /* Post Card */
    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .post-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .post-avatar {
      width: 38px; 
      height: 38px; 
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b6b, #ffc06b);
      display: flex; 
      align-items: center; 
      justify-content: center;
      font-weight: 700; 
      font-size: 0.8rem; 
      color: #0d0d0f;
    }

    /* Trending */
    .trending-panel {
      width: 240px; 
      flex-shrink: 0;
    }

    .panel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 16px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .trending-panel { display: none; }
    }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      nav { padding: 14px 18px; }
      .page { padding: 20px 14px; gap: 20px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">pulse<span>.</span></div>
  <div class="nav-right" id="navRight">
    <button class="btn btn-ghost" onclick="openModal('signin')">Sign In</button>
    <button class="btn btn-primary" onclick="openModal('signup')">Join Free</button>
  </div>
</nav>

<!-- SIGN IN MODAL -->
<div class="overlay" id="signinOverlay">
  <div class="modal">
    <h2>Welcome back</h2>
    <p>Sign in to your Pulse account.</p>
    <div class="field"><label>Email</label><input type="email" id="signinEmail" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="signinPass" placeholder="••••••••"/></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="doSignIn()">Sign In</button>
    </div>
  </div>
</div>

<!-- SIGN UP MODAL -->
<div class="overlay" id="signupOverlay">
  <div class="modal">
    <h2>Create account</h2>
    <p>Join Pulse and start sharing your world.</p>
    <div class="field"><label>Name</label><input type="text" id="signupName" placeholder="Your name"/></div>
    <div class="field"><label>Email</label><input type="email" id="signupEmail" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="signupPass" placeholder="••••••••"/></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModals()">Cancel</button>
      <button class="btn btn-primary" onclick="doSignUp()">Create Account</button>
    </div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="page">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <nav class="sidebar-nav">
      <a href="#" class="active"><span class="icon">⚡</span> Feed</a>
      <a href="#"><span class="icon">🔍</span> Explore</a>
      <a href="#"><span class="icon">🔔</span> Notifications</a>
      <a href="#"><span class="icon">📬</span> Messages</a>
      <a href="#"><span class="icon">🔖</span> Saved</a>
      <a href="#"><span class="icon">👤</span> Profile</a>
    </nav>
  </aside>

  <!-- FEED -->
  <main class="feed">
    <!-- Sign-in Gate -->
    <div class="signin-gate" id="signinGate" style="background:var(--surface); border:1px dashed var(--border); border-radius:var(--radius); padding:24px; text-align:center; margin-bottom:24px;">
      <p style="color:var(--muted); margin-bottom:14px;">Sign in to post, share photos, videos, and more.</p>
      <button class="btn btn-primary" onclick="openModal('signin')">Sign In to Post</button>
    </div>

    <!-- Composer -->
    <div class="composer" id="composer" style="display:none;">
      <div class="composer-top">
        <div class="composer-avatar" id="compAvatar">?</div>
        <textarea id="postText" placeholder="What's on your mind?" oninput="updateCounter()"></textarea>
      </div>
      <div class="media-preview" id="mediaPreview"></div>
      <div class="composer-footer">
        <div class="media-btns">
          <label class="file-label" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--muted);cursor:pointer;">
            📷 Photo
            <input type="file" accept="image/*" multiple onchange="handleFiles(this, 'image')">
          </label>
          <label class="file-label" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--muted);cursor:pointer;">
            🎬 Video
            <input type="file" accept="video/*" onchange="handleFiles(this, 'video')">
          </label>
          <button class="media-btn" onclick="addEmoji()" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 13px;color:var(--muted);cursor:pointer;">😊 Emoji</button>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="char-counter" id="charCounter">280</span>
          <button class="btn btn-primary" id="postBtn" onclick="submitPost()">Post</button>
        </div>
      </div>
    </div>

    <!-- Posts Container -->
    <div id="postsContainer"></div>
  </main>

  <!-- TRENDING -->
  <aside class="trending-panel">
    <div class="panel-card">
      <div style="font-family:var(--font-head);font-weight:700;font-size:0.9rem;margin-bottom:14px;color:var(--text);">🔥 Trending</div>
      <div class="trend-item" style="padding:8px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:0.85rem;font-weight:600;color:var(--accent);">#WebDev</div>
        <div style="font-size:0.75rem;color:var(--muted);">4,821 posts</div>
      </div>
      <!-- More trends... (shortened for brevity) -->
    </div>
  </aside>
</div>

<script>
// Your original JavaScript (unchanged)
let currentUser = null;
let posts = [];
let mediaFiles = [];

const seedPosts = [
  { id: 1, user: "Alex Rivera", initials: "AR", avatarGrad: "linear-gradient(135deg,#6bffce,#6b8eff)", time: "2h ago", text: "Just shipped a new feature 🚀 The dark mode toggle now respects your system preference automatically.", media: [], likes: 42, liked: false, bookmarked: false, tag: "🛠 Dev" },
  { id: 2, user: "Priya Nair", initials: "PN", avatarGrad: "linear-gradient(135deg,#ff6b6b,#ffc06b)", time: "5h ago", text: "Morning fog over the harbor. Sometimes the city feels completely different before 7am.", media: [{type:"image", url:"https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80"}], likes: 118, liked: false, bookmarked: false, tag: "📷 Photo" }
];

posts = [...seedPosts];
renderPosts();

function openModal(type) {
  closeModals();
  document.getElementById(type + 'Overlay').classList.add('active');
}

function closeModals() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
}

function doSignIn() {
  const email = document.getElementById('signinEmail').value.trim();
  if (!email) return alert('Please enter your email.');
  const name = email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g, c=>c.toUpperCase());
  signIn({name, email});
}

function doSignUp() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  if (!name || !email) return alert('Please fill required fields.');
  signIn({name, email});
}

function signIn(user) {
  currentUser = user;
  closeModals();
  updateNav();
  document.getElementById('signinGate').style.display = 'none';
  document.getElementById('composer').style.display = 'block';
  document.getElementById('compAvatar').textContent = user.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
}

function updateNav() {
  const navRight = document.getElementById('navRight');
  if (currentUser) {
    const initials = currentUser.name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
    navRight.innerHTML = `
      <div class="user-chip">
        <div class="avatar">${initials}</div>
        ${currentUser.name.split(' ')[0]}
      </div>
      <button class="btn btn-danger" onclick="signOut()">Sign Out</button>
    `;
  } else {
    navRight.innerHTML = `
      <button class="btn btn-ghost" onclick="openModal('signin')">Sign In</button>
      <button class="btn btn-primary" onclick="openModal('signup')">Join Free</button>
    `;
  }
}

function signOut() {
  currentUser = null;
  mediaFiles = [];
  document.getElementById('signinGate').style.display = 'block';
  document.getElementById('composer').style.display = 'none';
  document.getElementById('mediaPreview').innerHTML = '';
  updateNav();
}

function updateCounter() {
  const len = document.getElementById('postText').value.length;
  document.getElementById('charCounter').textContent = 280 - len;
}

function renderPosts() {
  const container = document.getElementById('postsContainer');
  container.innerHTML = posts.map(p => `
    <div class="post-card">
      <div class="post-header">
        <div class="post-avatar" style="background:${p.avatarGrad}">${p.initials}</div>
        <div style="flex:1">
          <div style="font-weight:600;">${p.user}</div>
          <div style="color:var(--muted);font-size:0.8rem;">${p.time}</div>
        </div>
        <div style="font-size:0.75rem;padding:3px 10px;border-radius:999px;border:1px solid var(--border);color:var(--muted);">${p.tag}</div>
      </div>
      <div style="margin-bottom:12px;">${p.text}</div>
      ${p.media.length ? `<img src="${p.media[0].url}" style="max-width:100%;border-radius:10px;">` : ''}
    </div>
  `).join('');
}

// Initialize
updateCounter();
updateNav();
</script>
</body>
</html>
